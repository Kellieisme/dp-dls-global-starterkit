<div class="d-flex align-items-center alert alert-warning" role="alert">
  <mat-icon class="me-2" svgIcon="icon-warning-filled"></mat-icon>
 Hover state alignment for icon buttons
  </div>


 <div class="button-row">
    <button mat-button>Primary</button>
    <!--  This format also works
  <a rel="noopener" mat-button href="#" target="_blank">Primary</a> -->
    <button mat-button routerLink="/">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>Primary
    </button>

    <button mat-stroked-button>Primary</button>

    <button mat-stroked-button routerLink="/">
      <mat-icon iconPositionEnd svgIcon="icon-favorite-filled"></mat-icon>Primary
    </button>

    <button mat-flat-button>Primary</button>

    <button mat-flat-button routerLink="/">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>Primary
    </button>

    <button mat-icon-button color="primary">
      <mat-icon svgIcon="icon-info-filled"></mat-icon>
    </button>

    <button mat-icon-button color="primary">
      <mat-icon svgIcon="icon-info"></mat-icon>
    </button>

    <button mat-icon-button class="filled-primary" color="primary">
      <mat-icon svgIcon="icon-info-filled"></mat-icon>
    </button>

    <button mat-icon-button class="filled-primary" color="primary">
      <mat-icon svgIcon="icon-info"></mat-icon>
    </button>

    <hr>

    <button mat-button color="accent">Accent</button>

    <button mat-button color="accent" routerLink="/">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>Accent
    </button>

    <button mat-stroked-button color="accent">Accent</button>

    <button mat-stroked-button color="accent">
      <mat-icon iconPositionEnd svgIcon="icon-favorite-filled"></mat-icon>Accent
    </button>

    <button mat-flat-button color="accent">Accent</button>

    <button mat-flat-button color="accent" routerLink="/">
      <mat-icon iconPositionEnd svgIcon="icon-favorite-filled"></mat-icon>Accent
    </button>



    <button mat-icon-button color="accent">
      <mat-icon svgIcon="icon-home-filled"></mat-icon>
    </button>

    <button mat-icon-button color="accent">
      <mat-icon svgIcon="icon-home"></mat-icon>
    </button>

    <button mat-icon-button class="filled-accent" color="accent">
      <mat-icon svgIcon="icon-home-filled"></mat-icon>
    </button>

    <button mat-icon-button class="filled-accent" color="accent">
      <mat-icon svgIcon="icon-home"></mat-icon>
    </button>

    <hr>


    <button mat-button color="warn">Warn</button>
    <button mat-button color="warn" routerLink="/">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>Warn
    </button>
    <button mat-stroked-button color="warn">Warn</button>

    <button mat-stroked-button color="warn">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>Share the love
    </button>

    <button mat-flat-button color="warn" routerLink="/">
      Warn
    </button>

    <button mat-flat-button color="warn" routerLink="/">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>warn
    </button>



    <button mat-icon-button color="warn">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>
    </button>

    <button mat-icon-button color="warn">
      <mat-icon svgIcon="icon-favorite"></mat-icon>
    </button>

    <button mat-icon-button class="filled-warn" color="warn">
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>
    </button>

    <button mat-icon-button class="filled-warn" color="warn">
      <mat-icon svgIcon="icon-favorite"></mat-icon>
    </button>


    <hr>

    <button mat-button disabled>Disabled</button>
    <button mat-stroked-button disabled>Disabled</button>
    <button mat-flat-button disabled>Disabled</button>

    <button mat-icon-button disabled>
      <mat-icon svgIcon="icon-favorite-filled"></mat-icon>
    </button>

    <button mat-icon-button disabled color="primary" class="filled-primary">
      <mat-icon svgIcon="icon-favorite"></mat-icon>
    </button>

<ba-top-app-bar homeRoute="/" appLogo="boeing-logomark" appName="Atmosphere Starter Kit (v20.2.10)">

  <div class="actions large-screen">

    <ba-theme-toggle></ba-theme-toggle>

    <button mat-icon-button aria-label="icon-button with a help icon">
      <mat-icon svgIcon="icon-help"></mat-icon>
    </button>

    <button mat-icon-button aria-label="icon-button with a notifications icon">
      <mat-icon svgIcon="icon-notifications"></mat-icon>
    </button>

    <button mat-icon-button aria-label="icon-button with a settings icon">
      <mat-icon svgIcon="icon-settings"></mat-icon>
    </button>
  </div>

  <div class="actions small-screen">


    <ba-theme-toggle></ba-theme-toggle>

    <button mat-icon-button [matMenuTriggerFor]="overflowMenu" aria-label="icon-button with a more vertical icon">
      <mat-icon svgIcon="icon-more-vert"></mat-icon>
    </button>

    <mat-menu #overflowMenu="matMenu">
      <button mat-menu-item>
        <mat-icon svgIcon="icon-help">Help</mat-icon>
        <span>Help</span>
      </button>

      <button mat-menu-item>
        <mat-icon svgIcon="icon-settings">Settings</mat-icon>
        <span>Settings</span>
      </button>
    </mat-menu>
  </div>

  <div class="divider-parent">
    <mat-divider [vertical]="true"> </mat-divider>
  </div>

  <ba-user-profile clickable class="avatar" userFirstName="William" [matMenuTriggerFor]="menuUserLetter"></ba-user-profile>

  <mat-menu #menuUserLetter="matMenu">
    <button mat-menu-item class="user-info-menu-item">
      <ba-user-profile userFirstName="William"></ba-user-profile>
      <div class="user-info">
        <span class="user-name">William Boeing</span>
        <span class="additional-info">Additional info</span>
      </div>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item>
      <span>Profile</span>
    </button>
    <button mat-menu-item>
      <span>Preferences</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item>
      <mat-icon svgIcon="icon-help"></mat-icon>
      <span>Help and tutorials</span>
    </button>
    <button mat-menu-item>
      <mat-icon svgIcon="icon-logout"></mat-icon>
      <span>Sign out</span>
    </button>
  </mat-menu>
</ba-top-app-bar>

<ba-navigation-rail
[hideLabels]="false"
[menuItems]="menuItems"
wide
homeRoute="/">

</ba-navigation-rail>
